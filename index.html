<style>
:root{--navy:#0C2D4A;--gold:#C8932A;--teal:#0D6E6E;--green:#2E7D32;--purple:#5B3FA6;--coral:#B04040;--light:#F4F1E8;--grey:#666;--danger:#c0392b;--success:#27ae60;--shadow:0 2px 12px rgba(0,0,0,.10);}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
body{background:#f0f2f5;color:#222;min-height:100vh;}
.navbar{background:var(--navy);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;box-shadow:var(--shadow);}
.brand-title{font-size:1.1rem;font-weight:700;}.brand-sub{font-size:.68rem;color:var(--gold);font-weight:600;}
.nav-user{display:flex;align-items:center;gap:14px;}.nav-user span{font-size:.85rem;color:#ccc;}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;}
.btn-logout:hover{background:rgba(255,255,255,.1);}
.layout{display:flex;min-height:calc(100vh - 58px);}
.sidebar{width:220px;background:var(--navy);padding:18px 0;flex-shrink:0;}
.sidebar .s-label{color:rgba(255,255,255,.4);font-size:.68rem;letter-spacing:1px;text-transform:uppercase;padding:10px 20px 4px;}
.sidebar a{display:flex;align-items:center;gap:8px;padding:10px 20px;color:rgba(255,255,255,.75);text-decoration:none;font-size:.87rem;cursor:pointer;transition:.15s;border-left:3px solid transparent;}
.sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--gold);}
.main{flex:1;padding:28px;overflow-y:auto;}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:var(--shadow);margin-bottom:20px;}
.card h2{font-size:1.05rem;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--light);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:22px;}
.stat{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--shadow);border-left:4px solid var(--gold);}
.stat.teal{border-color:var(--teal);}.stat.green{border-color:var(--green);}.stat.coral{border-color:var(--coral);}.stat.purple{border-color:var(--purple);}
.stat-val{font-size:1.6rem;font-weight:700;color:var(--navy);}.stat-lbl{font-size:.75rem;color:var(--grey);margin-top:2px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:#444;margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:.88rem;transition:.2s;background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,147,42,.12);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.87rem;font-weight:600;transition:.2s;}
.btn-primary{background:var(--navy);color:#fff;}.btn-primary:hover{background:#0a2238;}
.btn-gold{background:var(--gold);color:#fff;}.btn-gold:hover{background:#b07d20;}
.btn-teal{background:var(--teal);color:#fff;}.btn-teal:hover{background:#0a5a5a;}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#245e27;}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:#a93226;}
.btn-outline{background:transparent;border:1.5px solid var(--navy);color:var(--navy);}
.btn-sm{padding:5px 12px;font-size:.76rem;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.84rem;}
thead tr{background:var(--navy);color:#fff;}
th{padding:10px 14px;text-align:left;font-weight:600;font-size:.78rem;}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:hover td{background:#fafafa;}
.badge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;display:inline-block;}
.badge-pending{background:#FFF3CD;color:#856404;}.badge-approved{background:#D4EDDA;color:#155724;}
.badge-rejected{background:#F8D7DA;color:#721C24;}.badge-active{background:#D1ECF1;color:#0C5460;}
.badge-deferred{background:#E2D9F3;color:#5B3FA6;}.badge-latw{background:#D4EDDA;color:#2E7D32;}
.badge-confirmed{background:#D4EDDA;color:#155724;}.badge-standard{background:#D1ECF1;color:#0C5460;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,#1a4a6e 100%);}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-size:1.6rem;color:var(--navy);font-weight:800;}
.login-logo p{color:var(--gold);font-size:.85rem;font-weight:600;}
.login-logo .sub{color:var(--grey);font-size:.78rem;margin-top:4px;}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #eee;flex-wrap:wrap;}
.tab{padding:9px 18px;cursor:pointer;font-size:.84rem;color:var(--grey);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;border-radius:6px 6px 0 0;}
.tab:hover{color:var(--navy);background:#f5f5f5;}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700;}
.alert{padding:10px 16px;border-radius:8px;font-size:.84rem;margin-bottom:14px;}
.alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb;}
.alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
.alert-info{background:#d1ecf1;color:#0c5460;border:1px solid #bee5eb;}
.alert-warn{background:#fff3cd;color:#856404;border:1px solid #ffeeba;}
.public-nav{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;}
.public-nav .brand{color:#fff;font-weight:700;font-size:1.1rem;}
.public-nav .links{display:flex;gap:6px;}
.public-nav .links button{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;}
.public-nav .links .btn-apply{background:var(--gold);border-color:var(--gold);}
.public-hero{background:linear-gradient(135deg,var(--navy) 0%,#1a4a6e 100%);color:#fff;padding:56px 40px;text-align:center;}
.public-hero h1{font-size:2rem;font-weight:800;margin-bottom:10px;}
.public-hero p{font-size:1rem;color:rgba(255,255,255,.8);max-width:540px;margin:0 auto 24px;}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;padding:24px 28px;}
.course-card{background:#fff;border-radius:12px;padding:20px;box-shadow:var(--shadow);border-top:4px solid var(--gold);}
.course-card h3{color:var(--navy);font-size:.95rem;margin:8px 0 6px;}
.course-card p{color:var(--grey);font-size:.82rem;margin-bottom:12px;}
.page-title{font-size:1.25rem;font-weight:700;color:var(--navy);margin-bottom:20px;}
.empty{text-align:center;padding:40px;color:var(--grey);font-size:.88rem;}
.spinner{text-align:center;padding:30px;color:var(--grey);}
.divider{border:none;border-top:1px solid #eee;margin:16px 0;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:580px;width:92%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h3{color:var(--navy);font-size:1.05rem;margin-bottom:18px;}
.info-box{background:var(--light);border-radius:10px;padding:16px;margin-bottom:14px;}
.info-box h4{color:var(--navy);font-size:.85rem;margin-bottom:8px;}
.info-box p{font-size:.82rem;color:#444;line-height:1.6;}
.progress-bar-wrap{background:#eee;border-radius:20px;height:10px;margin-top:8px;}
.progress-bar{height:10px;border-radius:20px;background:var(--green);transition:.4s;}
.locked-overlay{text-align:center;padding:40px;background:linear-gradient(var(--light),#fff);border-radius:12px;}
.locked-overlay .lock-icon{font-size:2.5rem;margin-bottom:10px;}
@media(max-width:768px){.sidebar{display:none;}.form-row,.form-row-3{grid-template-columns:1fr;}.main{padding:16px;}}

/* ===== Modern logo & motion system ===== */
.brand-logo{position:relative;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.28));transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.brand-logo:hover{transform:scale(1.08) rotate(-4deg);}
.brand-logo:hover .lg-mark{transform:translate(-50%,-50%) scale(1.06);}
.brand-logo svg{display:block;}
.lg-badge{position:absolute;top:0;left:0;}
.lg-ring{transform-origin:50px 50px;animation:lg-spin 20s linear infinite;}
.lg-mark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:62%;height:62%;object-fit:contain;transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.lg-dot{position:absolute;bottom:3%;right:5%;width:16%;height:16%;min-width:6px;min-height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px #F7F4EC;animation:lg-pulse 2.4s ease-in-out infinite;}
@keyframes lg-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes lg-pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.55;transform:scale(1.25);}}

@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
#app{animation:fadeSlideUp .45s cubic-bezier(.16,1,.3,1);}
.card{animation:fadeSlideUp .5s cubic-bezier(.16,1,.3,1) both;transition:transform .25s ease,box-shadow .25s ease;}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(12,45,74,.16);}
.stat{transition:transform .2s ease,box-shadow .2s ease;cursor:default;}
.stat:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 24px rgba(0,0,0,.14);}
.course-card{transition:transform .25s ease,box-shadow .25s ease;}
.course-card:hover{transform:translateY(-5px);box-shadow:0 16px 32px rgba(0,0,0,.16);}
.sidebar a{position:relative;overflow:hidden;display:flex;align-items:center;gap:10px;}
.nav-icon{flex-shrink:0;opacity:.85;transition:opacity .2s ease,transform .2s ease;}
.sidebar a:hover .nav-icon,.sidebar a.active .nav-icon{opacity:1;transform:scale(1.08);}
.btn-row .nav-icon{margin-right:4px;vertical-align:-3px;}
.sidebar a::before{content:'';position:absolute;left:0;top:50%;width:3px;height:0;background:var(--gold);transform:translateY(-50%);transition:height .25s ease;}
.sidebar a:hover::before,.sidebar a.active::before{height:70%;}
.sidebar a:active{background:rgba(255,255,255,.14);}
.btn{position:relative;overflow:hidden;transform:translateZ(0);}
.btn:active{transform:scale(.96);}
.btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.55);transform:scale(0);animation:ripple-anim .55s ease-out;pointer-events:none;}
@keyframes ripple-anim{to{transform:scale(3);opacity:0;}}
.navbar{position:relative;overflow:hidden;}
.navbar::after{content:'';position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(115deg,transparent,rgba(255,255,255,.07),transparent);animation:navbar-shine 8s ease-in-out infinite;pointer-events:none;}
@keyframes navbar-shine{0%{left:-30%;}45%{left:110%;}100%{left:110%;}}
.public-nav{position:relative;overflow:hidden;}
.public-nav .links button{transition:transform .15s ease,background .2s ease;}
.public-nav .links button:hover{transform:translateY(-2px);}
.public-hero{position:relative;overflow:hidden;}
.public-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,rgba(200,147,42,.18),transparent 45%),radial-gradient(circle at 80% 70%,rgba(13,110,110,.22),transparent 45%);}
.public-hero>*{position:relative;}
.tab{position:relative;}
.tab.active{animation:fadeIn .25s ease;}
.modal{animation:fadeSlideUp .3s cubic-bezier(.16,1,.3,1);}
.modal-overlay{animation:fadeIn .2s ease;}
tbody tr{transition:background .15s ease,transform .15s ease;}
tbody tr:hover{background:rgba(200,147,42,.06);}

/* ===== Extra motion layer: forms, tables, tabs ===== */
.form-group{position:relative;}
.form-group input,.form-group select,.form-group textarea{transition:border-color .2s ease,box-shadow .2s ease,transform .15s ease;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{transform:translateY(-1px);}
.form-group label{transition:color .2s ease;}
.form-group:focus-within label{color:var(--gold,#c8932a);}

table tbody{display:table-row-group;}
table tbody tr{animation:rowIn .35s cubic-bezier(.16,1,.3,1) both;}
table tbody tr:nth-child(1){animation-delay:.02s;}
table tbody tr:nth-child(2){animation-delay:.05s;}
table tbody tr:nth-child(3){animation-delay:.08s;}
table tbody tr:nth-child(4){animation-delay:.11s;}
table tbody tr:nth-child(5){animation-delay:.14s;}
table tbody tr:nth-child(n+6){animation-delay:.16s;}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:translateX(0);}}

.course-card{overflow:hidden;}
.course-card h3,.course-card .desc{transition:transform .3s ease;}
.course-card:hover h3{transform:translateX(3px);}

.tab-bar,.tabs{position:relative;}
.tab-bar button,.tabs button{position:relative;transition:color .2s ease;}
.tab-bar button::after,.tabs button::after{content:'';position:absolute;left:8%;right:8%;bottom:-2px;height:2px;background:var(--gold,#c8932a);transform:scaleX(0);transform-origin:left;transition:transform .25s cubic-bezier(.16,1,.3,1);}
.tab-bar button.active::after,.tabs button.active::after{transform:scaleX(1);}

.btn{will-change:transform;}
.btn:hover{filter:brightness(1.04);}
.btn-row .btn{animation:fadeSlideUp .4s cubic-bezier(.16,1,.3,1) both;}
.btn-row .btn:nth-child(1){animation-delay:.03s;}
.btn-row .btn:nth-child(2){animation-delay:.06s;}
.btn-row .btn:nth-child(3){animation-delay:.09s;}
.btn-row .btn:nth-child(4){animation-delay:.12s;}

.stat-val{transition:transform .2s ease;}
.stat:hover .stat-val{transform:scale(1.06);}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001s!important;animation-iteration-count:1!important;transition-duration:.001s!important;}
}


/* mobile hamburger + swipe drawer */
.menu-toggle{display:none;background:transparent;border:none;color:#fff;font-size:1.35rem;cursor:pointer;padding:4px 10px;line-height:1;}
.sidebar-backdrop{display:none;}

  .menu-toggle{display:inline-flex;align-items:center;}

</style>

// ---- PDF receipt generation ----
function downloadReceipt(p){
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'pt',format:'a4'});
    const pageW=doc.internal.pageSize.getWidth();
    doc.setFillColor(12,45,74);
    doc.rect(0,0,pageW,90,'F');
    try{doc.addImage(LOGO_IMG,'PNG',40,15,60,60);}catch(e){}
    doc.setTextColor(255,255,255);
    doc.setFontSize(18);doc.setFont(undefined,'bold');
    doc.text('ESigodini VTC',115,42);
    doc.setFontSize(10);doc.setFont(undefined,'normal');
    doc.text('Official Payment Receipt',115,60);
    doc.setTextColor(20,20,20);
    let y=125;
    const line=(label,val)=>{doc.setFont(undefined,'bold');doc.setFontSize(10);doc.text(label,40,y);
      doc.setFont(undefined,'normal');doc.text(String(val||'-'),200,y);y+=24;};
    line('Receipt No.:',p.id?p.id.slice(0,8).toUpperCase():'-');
    line('Student Name:',p.studentName);
    line('Registration No.:',p.regNumber);
    line('Amount Paid:','$'+parseFloat(p.amount).toFixed(2));
    line('Payment Method:',(p.payment_method_type||'bank_transfer').replace('_',' '));
    line('Reference:',p.receipt_ref);
    line('Status:',(p.status||'confirmed').toUpperCase());
    line('Balance After:',p.balance_after!=null?'$'+parseFloat(p.balance_after).toFixed(2):'-');
    line('Date:',fmt(p.confirmed_at||p.created_at));
    y+=10;
    doc.setDrawColor(200,200,200);doc.line(40,y,pageW-40,y);y+=30;
    doc.setFontSize(9);doc.setTextColor(120,120,120);
    doc.text('This is a system-generated receipt from the ESigodini VTC Portal.',40,y);
    doc.save('Receipt_'+(p.regNumber||'student')+'_'+(p.id?p.id.slice(0,6):'')+'.pdf');
  }catch(err){showMsg('Could not generate PDF: '+err.message,'error');}
}

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){S.user=session.user;await loadProfile();}
  render();
  sb.auth.onAuthStateChange(async(e,session)=>{
    if(session){S.user=session.user;await loadProfile();}
    else{S={user:null,profile:null,page:'public',tab:'',modal:null,msg:'',data:{}};}
    render();
  });
}
async function loadProfile(){
  const{data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
  S.profile=data;
  if(data){
    if(data.role==='admin')S.page='admin';
    else if(data.role==='staff')S.page='staff';
    else if(data.role==='student')S.page='student';
  }
}
async function logout(){await sb.auth.signOut();S={user:null,profile:null,page:'public',tab:'',modal:null,msg:'',data:{}};render();}
function nav(page){S.page=page;S.tab='';S.data={};S.msg='';S.navOpen=false;render();}
function setTab(t){S.tab=t;S.msg='';S.navOpen=false;render();}
function render(){
  const app=document.getElementById('app');
  if(!S.user){
    if(S.page==='login')app.innerHTML=renderLogin();

}

async function loadVoting(){
  const el=document.getElementById('voting-posts-list');if(!el)return;

  let html='';
  for(const p of posts){
    const{data:cands}=await sb.from('election_candidates').select('*').eq('post_id',p.id).order('created_at');
    const{data:votes}=await sb.from('election_votes').select('candidate_id').eq('post_id',p.id);
    const counts={};(votes||[]).forEach(v=>{counts[v.candidate_id]=(counts[v.candidate_id]||0)+1;});
    const totals=(cands||[]).map(c=>({...c,total:(counts[c.id]||0)+(c.manual_votes||0),automatic:counts[c.id]||0}));
    const grandTotal=totals.reduce((s,c)=>s+c.total,0)||1;
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div><h2 style="margin:0">${p.title}</h2><p style="color:var(--grey);margin:4px 0 0">${p.description||''}</p></div>
        <div class="btn-row">

          <button class="btn btn-sm ${p.results_visible?'btn-teal':'btn-outline'}" onclick="toggleElectionPost('${p.id}','results_visible',${!p.results_visible})">${p.results_visible?'👁 Results Visible':'🙈 Results Hidden'}</button>
          <button class="btn btn-sm btn-outline" onclick="deleteElectionPost('${p.id}')" style="color:#c0392b">Delete Post</button>
        </div>
      </div>
      <div style="margin-top:16px">
        ${totals.map(c=>`<div style="margin-bottom:14px;padding:12px;background:#f9f9f9;border-radius:8px">
          <div style="display:flex;gap:12px;align-items:center">
            ${c.photo_url?`<img src="${c.photo_url}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0" alt=""/>`:`<div style="width:48px;height:48px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0">👤</div>`}
            <div style="flex:1;min-width:150px">
              <strong>${c.full_name}</strong>
              <div style="font-size:.78rem;color:var(--grey)">${c.manifesto||''}</div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:700;font-size:1.1rem">${c.total} votes</div>
              <div style="font-size:.75rem;color:var(--grey)">${c.automatic} auto + ${c.manual_votes||0} manual</div>
            </div>
            <button class="btn btn-sm btn-outline" onclick="deleteCandidate('${c.id}')" style="color:#c0392b">✕</button>
          </div>
          <div style="background:#e5e5e5;border-radius:6px;height:8px;margin-top:8px;overflow:hidden">
            <div style="background:var(--gold,#c8932a);height:100%;width:${Math.round(c.total/grandTotal*100)}%"></div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
            <label style="font-size:.78rem;color:var(--grey)">Manual votes:</label>
            <input id="mv-${c.id}" type="number" min="0" value="${c.manual_votes||0}" style="width:80px;padding:4px 8px;font-size:.85rem"/>
            <button class="btn btn-sm btn-outline" onclick="setManualVotes('${c.id}','mv-${c.id}')">Save</button>
          </div>
        </div>`).join('')||'<div class="empty">No candidates yet.</div>'}
      </div>
      <div style="border-top:1px solid #eee;margin-top:10px;padding-top:14px">
        <strong style="font-size:.85rem">+ Add Candidate</strong>
        <div class="form-row" style="margin-top:8px">
          <div class="form-group"><input id="cand-name-${p.id}" placeholder="Full name"/></div>
          <div class="form-group"><input id="cand-photo-${p.id}" placeholder="Photo URL (optional)"/></div>
        </div>
        <div class="form-group"><input id="cand-manifesto-${p.id}" placeholder="Manifesto / short pitch (optional)"/></div>
        <button class="btn btn-sm btn-primary" onclick="addCandidate('${p.id}')">Add Candidate</button>
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

async function approveApp(id){
  if(!confirm('Approve this application?\n\nThis will automatically create the student\'s login, generate their registration number, and email them an acceptance letter.'))return;
  showMsg('Processing approval — creating account and sending acceptance letter...');
  const{data,error}=await sb.functions.invoke('manage-accounts',{body:{action:'approve_application',applicationId:id}});
  if(error||data?.error){showMsg((data&&data.error)||error?.message||'Approval failed. You can still approve manually below.','error');await loadApps();return;}
  await logAudit('application.approve','applications',id,{status:'pending'},{status:'approved',reg_number:data.reg_number});
  showApprovalResult(data);
  await loadApps();
}
function showApprovalResult(data){
  const waMsg=encodeURIComponent(`Congratulations ${data.full_name}! Your application to ESigodini VTC has been ACCEPTED.\nRegistration Number: ${data.reg_number}\nLogin email: ${data.email}\nTemporary password: ${data.temp_password}\nPlease log in and change your password: ${window.location.origin}`);
  const waLink=data.phone?`https://wa.me/${data.phone.replace(/[^0-9]/g,'')}?text=${waMsg}`:null;
  document.getElementById('stu-modal')?.remove();
  document.body.insertAdjacentHTML('beforeend',`<div id="approval-modal"></div>`);
  document.getElementById('approval-modal').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this){this.remove()}">
    <div class="modal"><h3>✅ Student Accepted</h3>
      <div class="alert alert-success">Account created and acceptance email sent automatically.</div>
      <table style="font-size:.87rem;width:100%"><tbody>
        <tr><td style="padding:7px;color:var(--grey);width:150px">Reg Number</td><td><strong>${data.reg_number}</strong></td></tr>
        <tr><td style="padding:7px;color:var(--grey)">Login Email</td><td>${data.email||'—'}</td></tr>
        <tr><td style="padding:7px;color:var(--grey)">Temp Password</td><td><code>${data.temp_password}</code></td></tr>
      </tbody></table>
      <p style="font-size:.8rem;color:var(--grey);margin-top:10px">Student must change this password on first login.</p>
      <div class="btn-row" style="margin-top:14px">
        ${waLink?`<a class="btn btn-teal" target="_blank" href="${waLink}">Send via WhatsApp</a>`:''}
        <button class="btn btn-outline" onclick="document.getElementById('approval-modal').remove()">Close</button>
      </div>
    </div></div>`;
}
async function rejectApp(id){
  const reason=prompt('Rejection reason (optional):');
  await sb.from('applications').update({status:'rejected',rejection_reason:reason,reviewed_by:S.user.id,reviewed_at:new Date().toISOString()}).eq('id',id);
  await logAudit('application.reject','applications',id,{status:'pending'},{status:'rejected'});
  showMsg('Application rejected.','error');await loadApps();

async function createStudent(){
  const uid=document.getElementById('ns-uid')?.value?.trim(),name=document.getElementById('ns-name')?.value?.trim(),course=document.getElementById('ns-course')?.value;
  if(!uid||!name||!course){showMsg('Fill required fields','error');return;}
  await sb.from('profiles').upsert({id:uid,full_name:name,email:document.getElementById('ns-email')?.value||null,role:'student'});
  const{data:intake}=await sb.from('intakes').select('id,year').eq('is_active',true).order('created_at',{ascending:false}).limit(1).single();
  const yr=intake?.year||new Date().getFullYear();
  const{data:rn}=await sb.rpc('generate_reg_number',{intake_year:yr});
  const reg=rn||`EVTC-${yr}-${Math.floor(1000+Math.random()*9000)}`;
  const{error}=await sb.from('students').insert([{profile_id:uid,course_id:course,intake_id:intake?.id,residence:document.getElementById('ns-res')?.value,track:document.getElementById('ns-track')?.value,reg_number:reg,must_change_pw:true}]);
  if(error){showMsg(error.message,'error');return;}
  await logAudit('student.create','students',uid,null,{name,course});
  showMsg(`Student created! Reg: ${reg}`);document.getElementById('stu-modal').innerHTML='';await loadStudents();
}

async function loadPayments(){

    <td>${badge(p.payment_method_type||'bank_transfer')}</td>
    <td style="max-width:180px;word-break:break-all">${p.notes||'-'}</td>
    <td>${fmt(p.created_at)}</td>

    </td></tr>`).join(''):'<tr><td colspan="7" class="empty">No pending payments.</td></tr>';
  if(ctb)ctb.innerHTML=conf.data?.length?conf.data.map(p=>`<tr>
    <td>${p.students?.profiles?.full_name||'-'} <small>(${p.students?.reg_number||''})</small></td>
    <td><strong>$${parseFloat(p.amount).toFixed(2)}</strong></td>
    <td>${badge(p.payment_method_type||'bank_transfer')}</td>
    <td>${p.balance_after!=null?`$${parseFloat(p.balance_after).toFixed(2)}`:'-'}</td>
    <td>${fmt(p.confirmed_at)}</td>
    <td><button class="btn btn-outline btn-sm" onclick='downloadReceipt(${JSON.stringify({id:p.id,amount:p.amount,payment_method_type:p.payment_method_type,receipt_ref:p.receipt_ref,status:p.status,balance_after:p.balance_after,confirmed_at:p.confirmed_at,created_at:p.created_at,studentName:p.students?.profiles?.full_name,regNumber:p.students?.reg_number}).replace(/'/g,"&apos;")})'>📄 PDF</button></td>
  </tr>`).join(''):'<tr><td colspan="6" class="empty">No confirmed payments yet.</td></tr>';

async function confirmPayment(id,studentId,amount){
  // Get total paid so far + current fee structure
  const{data:prev}=await sb.from('fee_payments').select('amount').eq('student_id',studentId).eq('status','confirmed');
  const totalPaid=(prev||[]).reduce((s,p)=>s+parseFloat(p.amount),0)+parseFloat(amount);
  // Get fee structure for this student
  const{data:stu}=await sb.from('students').select('course_id,residence,track').eq('id',studentId).single();
  const{data:fees}=await sb.from('fee_structure').select('amount').eq('course_id',stu?.course_id).eq('residence',stu?.residence).eq('is_active',true);
  const totalFee=(fees||[]).reduce((s,f)=>s+parseFloat(f.amount),0);
  const balance=Math.max(0,totalFee-totalPaid);
  await sb.from('fee_payments').update({status:'confirmed',confirmed_by:S.user.id,confirmed_at:new Date().toISOString(),balance_after:balance}).eq('id',id);
  await logAudit('payment.confirm','fee_payments',id,{status:'pending'},{status:'confirmed',balance_after:balance});
  showMsg(`Payment confirmed! Balance remaining: $${balance.toFixed(2)}`);await loadPayments();
}
async function rejectPayment(id){
  await sb.from('fee_payments').update({status:'rejected'}).eq('id',id);
  showMsg('Payment rejected.','error');await loadPayments();
}

async function loadStuVote(){
  const el=document.getElementById('vote-list');if(!el)return;

    const{data:cands}=await sb.from('election_candidates').select('*').eq('post_id',p.id).order('created_at');
    const{data:myVote}=await sb.from('election_votes').select('candidate_id').eq('post_id',p.id).eq('student_id',stu.id).maybeSingle();
    let tallyHtml='';
    if(p.results_visible){
      const{data:votes}=await sb.from('election_votes').select('candidate_id').eq('post_id',p.id);
      const counts={};(votes||[]).forEach(v=>{counts[v.candidate_id]=(counts[v.candidate_id]||0)+1;});
      const totals=(cands||[]).map(c=>({...c,total:(counts[c.id]||0)+(c.manual_votes||0)}));
      const grand=totals.reduce((s,c)=>s+c.total,0)||1;
      tallyHtml=`<div style="margin-top:14px;border-top:1px solid #eee;padding-top:12px"><strong style="font-size:.85rem">Current Results</strong>
        ${totals.map(c=>`<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:.85rem"><span>${c.full_name}</span><span>${c.total} votes</span></div>
        <div style="background:#e5e5e5;border-radius:6px;height:8px;margin-top:4px;overflow:hidden"><div style="background:var(--teal,#0d6e6e);height:100%;width:${Math.round(c.total/grand*100)}%"></div></div></div>`).join('')}
      </div>`;
    }
    html+=`<div class="card">
      <h2 style="margin:0">${p.title}</h2><p style="color:var(--grey);margin:4px 0 14px">${p.description||''}</p>
      ${myVote?`<div class="alert alert-success">✓ You voted for <strong>${cands?.find(c=>c.id===myVote.candidate_id)?.full_name||'a candidate'}</strong>.</div>`:
      (cands?.length?cands.map(c=>`<div style="display:flex;gap:12px;align-items:center;padding:10px;background:#f9f9f9;border-radius:8px;margin-bottom:10px">
        ${c.photo_url?`<img src="${c.photo_url}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0" alt=""/>`:`<div style="width:52px;height:52px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0">👤</div>`}
        <div style="flex:1"><strong>${c.full_name}</strong><div style="font-size:.8rem;color:var(--grey)">${c.manifesto||''}</div></div>
        <button class="btn btn-primary btn-sm" onclick="castVote('${p.id}','${c.id}')">Vote</button>
      </div>`).join(''):'<div class="empty">No candidates listed yet.</div>')}
      ${tallyHtml}
    </div>`;
  }
  el.innerHTML=html;
}

async function loadStuResults(){

  if(ps?.results_locked){
    lockEl.innerHTML=`<div class="locked-overlay"><div class="lock-icon">🔒</div><h3>Results Currently Locked</h3><p style="color:var(--grey);margin-top:8px">Administration has temporarily locked results. Please check back later or contact admin.</p></div>`;
    return;
  }
  // Check if student has paid enough
  const{data:stu}=await sb.from('students').select('id').eq('profile_id',S.user.id).single();
  if(!stu)return;
  const{data:payments}=await sb.from('fee_payments').select('amount').eq('student_id',stu.id).eq('status','confirmed');
  const totalPaid=(payments||[]).reduce((s,p)=>s+parseFloat(p.amount),0);
  const minFee=parseFloat(ps?.min_fee_for_results||0);
  if(minFee>0&&totalPaid<minFee){
    lockEl.innerHTML=`<div class="locked-overlay">
      <div class="lock-icon">🔒</div>
      <h3>Results Locked</h3>
      <p style="color:var(--grey);margin-top:8px">You need to have paid at least <strong>$${minFee.toFixed(2)}</strong> to view your results.</p>
      <p style="margin-top:6px;font-size:.85rem;color:var(--grey)">You have paid: <strong>$${totalPaid.toFixed(2)}</strong></p>
      <div class="progress-bar-wrap" style="max-width:300px;margin:12px auto"><div class="progress-bar" style="width:${Math.min(100,(totalPaid/minFee)*100).toFixed(0)}%"></div></div>
      <button class="btn btn-gold" style="margin-top:16px" onclick="setTab('fees')">Go to Fees & Payments</button>
    </div>`;
    return;
  }
  // Can see results
  const{data:results}=await sb.from('results').select('*,terms(term_number,term_type)').eq('student_id',stu.id).order('created_at',{ascending:false});
  lockEl.innerHTML=`<div class="card"><h2>📝 Academic Results</h2>
    ${results?.length?`<div class="tbl-wrap"><table>
      <thead><tr><th>Term</th><th>Subject</th><th>Score</th><th>Grade</th><th>Remarks</th></tr></thead>
      <tbody>${results.map(r=>`<tr>

        <td>${r.remarks||'-'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`:'<div class="empty">No results recorded yet.</div>'}
  </div>`;
}

// ---- Help chat widget ----
let helpOpen=false, helpHistory=[];
function toggleHelp(){
  helpOpen=!helpOpen;
  const panel=document.getElementById('help-panel');
  const btn=document.getElementById('help-fab-btn');
  if(helpOpen){
    btn.textContent='✕';
    panel.style.display='flex';
    if(!panel.dataset.built){
      panel.innerHTML=`<div class="help-panel-header"><strong>💬 Portal Help</strong><button onclick="toggleHelp()">✕</button></div>
        <div class="help-msgs" id="help-msgs"><div class="help-msg bot">Hi! I can help you find your way around the ESigodini VTC Portal — applying, tracking your application, fees, results, voting, or anything else. What do you need help with?</div></div>
        <div class="help-input-row"><input id="help-input" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendHelpMsg()"/><button onclick="sendHelpMsg()">Send</button></div>`;
      panel.dataset.built='1';
    }
    document.getElementById('help-input')?.focus();
  } else {
    btn.textContent='💬';
    panel.style.display='none';
  }
}
async function sendHelpMsg(){
  const input=document.getElementById('help-input');
  const msg=input?.value?.trim();
  if(!msg)return;
  const msgsEl=document.getElementById('help-msgs');
  msgsEl.insertAdjacentHTML('beforeend',`<div class="help-msg user">${msg.replace(/</g,'&lt;')}</div>`);
  input.value='';
  msgsEl.insertAdjacentHTML('beforeend','<div class="help-msg bot typing" id="help-typing">Typing...</div>');
  msgsEl.scrollTop=msgsEl.scrollHeight;
  try{
    const{data,error}=await sb.functions.invoke('portal-assistant',{body:{message:msg,history:helpHistory}});
    document.getElementById('help-typing')?.remove();
    const reply=error?"Sorry, I'm having trouble responding right now. Please try again in a moment.":(data?.reply||data?.error||"Sorry, I couldn't answer that.");
    msgsEl.insertAdjacentHTML('beforeend',`<div class="help-msg bot">${reply.replace(/</g,'&lt;')}</div>`);
    helpHistory.push({role:'user',text:msg},{role:'assistant',text:reply});
  }catch(e){
    document.getElementById('help-typing')?.remove();
    msgsEl.insertAdjacentHTML('beforeend','<div class="help-msg bot">Sorry, something went wrong. Please try again.</div>');
  }
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

// ---- Modern gesture layer: ripple feedback + swipe-to-open/close drawer ----
document.addEventListener('click',function(e){
  const btn=e.target.closest('.btn,.btn-logout,.public-nav .links button');
  if(!btn)return;
  const r=document.createElement('span');
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.className='ripple';
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';
  r.style.top=(e.clientY-rect.top-size/2)+'px';
  btn.appendChild(r);
  setTimeout(()=>r.remove(),550);
});
(function(){
  let touchStartX=0,touchStartY=0,tracking=false;
  document.addEventListener('touchstart',function(e){
    const t=e.touches[0];
    touchStartX=t.clientX;touchStartY=t.clientY;
    tracking = touchStartX<24 || !!e.target.closest('.sidebar');
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!tracking)return;
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
    if(Math.abs(dx)>60 && Math.abs(dy)<60){
      if(dx>0 && touchStartX<24) toggleNav();
      else if(dx<0 && S.navOpen) closeNav();
    }
    tracking=false;
  },{passive:true});
})();
</script>
